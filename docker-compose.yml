services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ngo_management}
      POSTGRES_USER: ${POSTGRES_USER:-ngo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ngo_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"

volumes:
  postgres_data:

